<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="966" cy="387" r="62" fill="#1d4ed8" opacity="0.10"/>
    <circle cx="416" cy="75" r="20" fill="#1d4ed8" opacity="0.19"/>
    <circle cx="597" cy="66" r="87" fill="#1d4ed8" opacity="0.16"/>
    <circle cx="-74" cy="261" r="58" fill="#1d4ed8" opacity="0.18"/>
    <circle cx="234" cy="547" r="76" fill="#1d4ed8" opacity="0.14"/>
    <circle cx="229" cy="595" r="24" fill="#1d4ed8" opacity="0.06"/>
    <rect x="401" y="355" width="64" height="56" rx="8" fill="#2563eb" opacity="0.13" transform="rotate(44, 1231, 187)"/>
    <rect x="242" y="443" width="77" height="95" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(0, 928, 706)"/>
    <rect x="1184" y="-59" width="51" height="20" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(34, 950, 706)"/>
    <rect x="660" y="-68" width="68" height="86" rx="8" fill="#2563eb" opacity="0.07" transform="rotate(34, 1026, 30)"/>
    <rect x="578" y="341" width="96" height="37" rx="8" fill="#2563eb" opacity="0.05" transform="rotate(41, -19, 44)"/>
    <rect x="474" y="472" width="57" height="96" rx="8" fill="#2563eb" opacity="0.06" transform="rotate(0, 966, -12)"/>
    <rect x="953" y="588" width="81" height="33" rx="8" fill="#2563eb" opacity="0.06" transform="rotate(9, 1233, 699)"/>
    <rect x="1171" y="502" width="52" height="76" rx="8" fill="#2563eb" opacity="0.13" transform="rotate(30, 124, 417)"/>
    <polygon points="1104,299 1166,423 1042,423" fill="#1d4ed8" opacity="0.13"/>
    <polygon points="913,153 990,307 836,307" fill="#1d4ed8" opacity="0.11"/>
    <polygon points="443,366 498,476 388,476" fill="#1d4ed8" opacity="0.12"/>
    <polygon points="1228,105 1301,251 1155,251" fill="#1d4ed8" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,558 C360,594 840,522 1200,558 L1200,630 L0,630Z" fill="#1d4ed8" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 자동화 프로그램
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 주식투자
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 자동화 프로그램 — 주식투자
  </text>
</svg>